pre-commit:
  parallel: true
  jobs:
    - name: biome
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --staged
      stage_fixed: true
    - name: typescript
      run: pnpm type-check

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
